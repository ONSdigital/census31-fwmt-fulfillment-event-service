server:
  port: 8070

spring:
  application:
    name: census31-fwmt-fulfillment-event-service
  security:
    user:
      name: "user"
      password: "password"
  datasource:
    url: jdbc:postgresql://localhost/postgres?currentSchema=fwmtg
    driver-class-name: org.postgresql.Driver
    schema: classpath:/schema.sql
    continue-on-error: false
    username: postgres
    password: postgres
    initialization-mode: always

management:
  # Place /info and /health in the root
  endpoints.web.base-path: ''
  endpoint:
    health:
      show-details: always

logging:
  profile: DEV
  level:
    root: WARN
    uk.gov.ons.census.fwmt: INFO
    org.springframework: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate: INFO
    org.apache.commons.dbcp2: INFO
totalmobile:
  username: "user"
  password: "password"
  baseUrl: "http://localhost:8000/"
  healthcheckPath: "swagger/index.html"
  comet:
    clientID: ""
    clientSecret: ""
    resource: "https://int-ons-comet-api-app-ukwest.azurewebsites.net"
    authority: "https://login.microsoftonline.com/05057611-67c0-4390-85ef-2c623ff4104f/oauth2/v2.0/token"
  operation:
    case:
      create:
        path: "cases/"

fwmt:
  workTypes:
    ccs:
      duration: 5
    ce:
      duration: 5
    hh:
      duration: 5
    ohs:
      duration: 5
      
eq:
  url: "https://fieldservice-ENV_NAME.census-gcp.onsdigital.uk/launch/"

spg:
  followUpDate: 11111

ce:
   followUpDate: "01/05/2020"
   startDate: "01/05/2020"

fulfilment:
  pauseRules:
    path: classpath:/pauseRules.txt
  channel:
    path: classpath:/channelChecker.txt


app:
  testing: false
  messaging:
    provider: pubsub
    destinations:
      rmField: "RM.Field"

---
spring:
  config:
    activate:
      on-property:
        name: app.messaging.provider
        having-value: pubsub
  cloud:
    gcp:
      project-id: ${FWMT_PUBSUB_PROJECT:fwmt-local}
      credentials:
        enabled: false
      pubsub:
        enabled: true
        emulator-host: ${PUBSUB_EMULATOR_HOST:localhost:8085}
